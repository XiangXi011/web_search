use_default_settings: true

general:
  debug: false
  instance_name: "Search Gateway SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "search-gateway-searxng-secret-key-change-in-production"
  limiter: false
  image_proxy: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

redis:
  url: false

ui:
  default_theme: simple
  query_in_title: false
  infinite_scroll: false
  center_alignment: false

enabled_plugins:
  - 'Hash plugin'
  - 'Self Informations'
  - 'Tracker URL remover'
  - 'Ahmia blacklist'

engines:
  # China search engines (general_cn, fresh_cn profiles)
  - name: baidu
    disabled: false
  - name: sogou
    disabled: false
  - name: 360search
    disabled: false
  - name: quark
    disabled: false
  - name: sogou wechat
    disabled: false

  # General search engines
  - name: bing
    disabled: false
  - name: yandex
    disabled: false

  # Tech profile engines
  - name: github
    disabled: false
  - name: stackoverflow
    disabled: false
  - name: pypi
    disabled: false
  - name: npm
    disabled: false
  - name: mdn
    disabled: false
  - name: microsoft learn
    disabled: false

  # Research profile engines
  - name: arxiv
    disabled: false
  - name: crossref
    disabled: false
  - name: openalex
    disabled: false
